<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوة</title>

<style>
*{
    margin:0;
    padding:0;
}

body{
    font-family: 'Tahoma', sans-serif;
    min-height:100vh;
    

    /* الخلفية */
    background:url('111.jpg') center center/cover no-repeat fixed;
    font-size: 10px;
    display:flex;
    justify-content:center;
    align-items:center;
    color: #432e1d;
}
#responseButtons button {
  width:45%;
  font-size: 20px;
  padding: 10px;
  margin: 30px 0;
  margin-bottom: -50px;
  border-radius: 30px;
  background: #432e1d;
  color: white;
  border: none;
  cursor: pointer;
  gap: 50px;
  margin-top: 20px;


}

/* ===== QR ===== */
#qrContainer{
  width:100px;
  height:100px;
  margin:20px auto;
}

.container{
    width:500px;
    border-radius:25px;
    padding:20px;
    text-align:center;

}

.title{
    color:#432e1d;
    font-size:28px;
    margin-bottom:20px;
}

.image-box{
    margin-bottom:20px;
}

.image-box img{
    width:100%;
    border-radius:30px;
    display:block;
    box-shadow:0cap 15px 20px rgb(0, 0, 0);
    transition:0.3s;
      margin: 50px 0;

}


.text{
    color:white;
    margin-top:10px;
    font-size:16px;
}
#countdown {
  
  display: flex;
  justify-content:space-evenly;
  margin: 5px 0;
  text-align: center;
    border: none;


}

.time-box {
  background: #5a3f2a;
  color: white;
  border-radius: 15px;
  padding: 20px;
}

.time-box span {
  font-size: 20px;
  font-weight: bold;
}

.time-label {
  font-size: 10px;
}
#intro{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:99999; /* مهم جدًا */
    display:flex;
}

/* النصين */
.half{
    width:50%;
    height:100%;
    transition:all 1.5s ease;
}

/* الصور */
.left{
    background:url("6666.png") center/cover no-repeat;
}

.right{
    background:url("666.png") center/cover no-repeat;
}

/* فتح من النص */
#intro.open .left{
    transform:translateX(100%);
}

#intro.open .right{
    transform:translateX(-100%);
}

/* يمنع اللمس أثناء الحركة */
#intro.lock{
    pointer-events:none;
}

/* بعد الإغلاق النهائي */
#intro.hide{
    display:none;
}

/* زر البداية */
#startBtn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:10000;
    background:none;
    border:none;
    cursor:pointer;
}

#startBtn img{
    width:150px;
    height:150px;
    border-radius:50%;
}




</style>
</head>

<body>

<div class="container">
<audio id="openSound" src="open.mp3" preload="auto"></audio>

<!-- ===== الانترو ===== -->
<div id="intro">
    <div class="half left"></div>
    <div class="half right"></div>

    <button id="startBtn">
        <img src="555.png" alt="start">
    </button>
</div>

      <div class="image-box">
        <img src="111.png" alt="الصورة الأولى">

    </div>
    


    <h1 id="welcomeText">حيّاك الله،</h1>
  <h2 style="color:#432e1d;" id="attendanceTitle">الرجاء تأكيد حضورك</h2>
  <div id="responseButtons">
       <button  onclick="confirmAttendance('yes')">نعم، بإذن الله</button>
      <button  onclick="confirmAttendance('no')">لا، أعتذر</button>
    </div>

  <p style="text-align: center;" id="responseMsg"></p>

  <div style="align-items: center;" id="qrContainer"></div>
  <p  id="qrNote" style="display:none;text-align: center;">📌 استخدم رمز الدخول عند الوصول للقاعة</p>
  <p id="invitationCount" style="display:none;text-align: center;"></p>

    <div style="position: absolute;left: 80px;top: 840px;    justify-content:space-between;gap: 10px;" id="countdown">
    <div  class="time-box">
      <span id="days">00</span>
      <div class="time-label">يوم</div>
    </div>
    <div class="time-box">
      <span id="hours">00</span>
      <div class="time-label">ساعة</div>
    </div>
    <div class="time-box">
      <span id="minutes">00</span>
      <div class="time-label">دقيقة</div>
    </div>
  </div>
            <img style="height: 250px;width: 300px;position: absolute;left:50px ;top: 900px;"  src="44.png" alt="الصورة">


            <img style="height: 300px;width: 400px;position:absolute;left: 1px;z-index: -1;top: 930px;"  src="33.png" alt="الصورة">


</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>

  const token = new URLSearchParams(location.search).get("token") || "";
  const qrContainer = document.getElementById("qrContainer");
  const responseButtons = document.getElementById("responseButtons");
  const attendanceTitle = document.getElementById("attendanceTitle");
  const responseMsg = document.getElementById("responseMsg");
  const qrNote = document.getElementById("qrNote");
  const invitationCount = document.getElementById("invitationCount");
 
  // Elements for the message box
  const messageTextarea = document.getElementById("message");
  const sendMessageBtn = document.getElementById("sendMessageBtn");
  const messageStatus = document.getElementById("messageStatus");

  // URL for the Google Apps Script
  const scriptURL = "https://script.google.com/macros/s/AKfycbzCQBunXwx5bDqEhB-HoHwJ6RefnE-W8xXiPq8WnCRFtmYxdtVq76qY64Qc0aH9uqYUQQ/exec";
window.onload = function() {
  loadGuestName();
  loadAttendanceStatus();
};

function loadGuestName() {
  fetch(`${scriptURL}?token=${token}`)
    .then(res => res.json())
    .then(res => {
      document.getElementById("welcomeText").innerText =
        "حيّاك الله، " + (res.name || "ضيفنا");
    });
}

function loadAttendanceStatus() {
  fetch(`${scriptURL}?token=${token}`)
    .then(res => res.json())
    .then(res => {

      if (res.status === "already") {
        responseButtons.style.display = "none";
        attendanceTitle.style.display = "none";
        responseMsg.innerText = res.message;

        if (res.qr) {
          showQR(res.qr, res.max);
        }
      }

      if (res.status === "declined") {
        responseButtons.style.display = "none";
        attendanceTitle.style.display = "none";
        responseMsg.innerText = res.message;
      }
    });
}


  function confirmAttendance(response) {
  responseMsg.innerText = "⏳ جاري التسجيل...";

  fetch(`${scriptURL}?token=${token}&response=${response}`)
    .then(res => res.json())
    .then(res => {
      responseButtons.style.display = "none";
      attendanceTitle.style.display = "none";
      responseMsg.innerText = res.message;

      if (res.status === "success" || res.status === "already") {
        showQR(res.qr, res.max);
      } else if (res.status === "declined") {
        qrContainer.innerHTML = "";
      }
    })
    .catch(() => {
      responseMsg.innerText = "❌ خطأ في الاتصال";
    });
}
  function showQR(link, count) {
    qrContainer.innerHTML = "";
    new QRCode(qrContainer, { text: link, width: 100, height: 100  });
    qrNote.style.display = "block";
    invitationCount.style.display = "block";
    invitationCount.innerText = `📩 عدد الدعوات: ${count}`;

     const thankYouImage = document.getElementById("thankYouImage");
  if (thankYouImage) {
    thankYouImage.style.display = "block";
  }
}

 
var countDownDate = new Date("jul 26, 2026 20:00:00").getTime();
  var x = setInterval(function() {
    var now = new Date().getTime();
    var distance = countDownDate - now;
    var days = Math.floor(distance / (1000 * 60 * 60 * 24));
    var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    document.getElementById("days").innerHTML = days;
    document.getElementById("hours").innerHTML = hours;
    document.getElementById("minutes").innerHTML = minutes;
    if (distance < 0) {
      clearInterval(x);
      document.getElementById("countdown").innerHTML = "انتهى الوقت";
    }
  }, 1000);


const btn = document.getElementById("startBtn");
const intro = document.getElementById("intro");
const sound = document.getElementById("openSound");

btn.onclick = function(){

    // صوت
    sound.currentTime = 0;
    sound.play();

    // بدء الفتح
    intro.classList.add("open");
    intro.classList.add("lock");

    // إخفاء الزر
    btn.style.display = "none";

    // اختفاء نهائي بعد الحركة
    setTimeout(()=>{
        intro.classList.add("hide");
    }, 1600);
};
</script>
</body>
</html>
