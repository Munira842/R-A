<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوة</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Tahoma', sans-serif;
    min-height:100vh;

    /* الخلفية */
    background:url('22.jpg') center center/cover no-repeat fixed;

    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:400px;
    backdrop-filter:blur(8px);
    border-radius:25px;
    padding:20px;
    text-align:center;
}

.title{
    color:white;
    font-size:28px;
    margin-bottom:20px;
    text-shadow:0 2px 10px rgba(0,0,0,.4);
}

.image-box{
    margin-bottom:20px;
}

.image-box img{
    width:100%;
    border-radius:20px;
    display:block;
    box-shadow:0 8px 25px rgba(0,0,0,.25);
    transition:0.4s;
}


.text{
    color:white;
    margin-top:10px;
    font-size:16px;
}
</style>
</head>

<body>

<div class="container">


    <div class="image-box">
        <img src="11.png" alt="الصورة الأولى">

    </div>
    
  <p class="bounce">↓ تأكيد الحضور ↓</p>

  <h1 id="welcomeText">حيّاك الله،</h1>

  <h2 id="attendanceTitle">الرجاء تأكيد حضورك</h2>
  <div id="responseButtons">
       <button style="padding:6px 12px;font-size: 20px;border-radius:33px;background-color: #285069;color: #f6f2ec;width: 200px;" onclick="confirmAttendance('yes')">نعم، بإذن الله</button>
      <button style="padding:6px 12px;font-size: 20px;border-radius:33px;background-color: #285069;color: #f6f2ec;width: 250px" onclick="confirmAttendance('no')">لا، أعتذر عن الحضور</button>
    </div>

  <p style="text-align: center;" id="responseMsg"></p>

  <div style="align-items: center;" id="qrContainer"></div>
  <p  id="qrNote" style="display:none;text-align: center;">📌 استخدم رمز الدخول عند الوصول للقاعة</p>
  <p id="invitationCount" style="display:none;text-align: center;"></p>
    <div id="countdown">
    <div class="time-box">
      <span id="days">00</span>
      <div class="time-label">يوم</div>
    </div>
    <div class="time-box">
      <span id="hours">00</span>
      <div class="time-label">ساعة</div>
    </div>
    <div class="time-box">
      <span id="minutes">00</span>
      <div class="time-label">دقيقة</div>
    </div>
  </div>
      <iframe src="https://www.google.com/maps/embed?pb=!1m17!1m12!1m3!1d3705.7689325279557!2d39.14814!3d21.750482!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m2!1m1!2zMjHCsDQ1JzAxLjciTiAzOcKwMDgnNTMuMyJF!5e0!3m2!1sar!2ssa!4v1765997650121!5m2!1sar!2ssa" width="300" height="100" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>  


            <img style="height: 300px;width: 380px;" " src="33.png" alt="الصورة">


</div>

</body>
</html>
